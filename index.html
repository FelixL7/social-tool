<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Tool - Instagram Post Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;600;700&family=Montserrat:wght@300;400;600;700;900&family=Oswald:wght@300;400;600;700&family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>

    <!-- Top Toolbar -->
    <header id="toolbar">
        <div class="toolbar-section toolbar-left">
            <div class="format-selector">
                <select id="format-select">
                    <option value="post-square">Post Quadrat (1080 x 1080)</option>
                    <option value="post-portrait">Post Hochformat (1080 x 1350)</option>
                    <option value="post-landscape">Post Querformat (1080 x 566)</option>
                    <option value="story">Story / Reel (1080 x 1920)</option>
                    <option value="custom">Manuell</option>
                </select>
                <div id="custom-size" style="display:none;">
                    <input type="number" id="custom-width" class="num-input" value="1080" min="1" max="10000" title="Breite" placeholder="B">
                    <span>&times;</span>
                    <input type="number" id="custom-height" class="num-input" value="1080" min="1" max="10000" title="Hoehe" placeholder="H">
                </div>
            </div>
        </div>

        <div class="toolbar-section toolbar-center">
            <div class="tool-group">
                <button id="tool-text" class="tool-btn" title="Text hinzufuegen (T)">
                    <span class="tool-icon">T</span>
                    <span class="tool-label">Text</span>
                </button>
                <button id="tool-image" class="tool-btn" title="Bild einfuegen">
                    <span class="tool-icon">&ofcir;</span>
                    <span class="tool-label">Bild</span>
                </button>
                <input type="file" id="image-upload" accept="image/*" hidden>
            </div>
            <div class="tool-divider"></div>
            <div class="tool-group">
                <button id="tool-rect" class="tool-btn" title="Rechteck">
                    <span class="tool-icon rect-icon"></span>
                    <span class="tool-label">Rechteck</span>
                </button>
                <button id="tool-circle" class="tool-btn" title="Kreis">
                    <span class="tool-icon circle-icon"></span>
                    <span class="tool-label">Kreis</span>
                </button>
                <button id="tool-triangle" class="tool-btn" title="Dreieck">
                    <span class="tool-icon triangle-icon"></span>
                    <span class="tool-label">Dreieck</span>
                </button>
                <button id="tool-line" class="tool-btn" title="Linie">
                    <span class="tool-icon line-icon"></span>
                    <span class="tool-label">Linie</span>
                </button>
                <button id="tool-blob" class="tool-btn" title="Blobs">
                    <span class="tool-icon blob-icon"></span>
                    <span class="tool-label">Blob</span>
                </button>
            </div>
            <div class="tool-divider"></div>
            <div class="tool-group">
                <button id="tool-forward" class="tool-btn" title="Nach vorne">
                    <span class="tool-icon">&uarr;</span>
                </button>
                <button id="tool-backward" class="tool-btn" title="Nach hinten">
                    <span class="tool-icon">&darr;</span>
                </button>
                <button id="tool-delete" class="tool-btn tool-btn-danger" title="Loeschen (Entf)">
                    <span class="tool-icon">&times;</span>
                </button>
            </div>
            <div class="tool-divider"></div>
            <div class="tool-group">
                <button id="tool-undo" class="tool-btn" title="Rueckgaengig (Ctrl+Z)" disabled>
                    <span class="tool-icon">&#x21B6;</span>
                </button>
                <button id="tool-redo" class="tool-btn" title="Wiederholen (Ctrl+Y)" disabled>
                    <span class="tool-icon">&#x21B7;</span>
                </button>
            </div>
        </div>

        <div class="toolbar-section toolbar-right">
            <button id="btn-save" class="action-btn" title="Projekt speichern (Ctrl+S)">Speichern</button>
            <button id="btn-load" class="action-btn" title="Projekt laden">Laden</button>
            <input type="file" id="project-load" accept=".json" hidden>
            <div class="tool-divider"></div>
            <button id="btn-export" class="action-btn action-btn-primary" title="Slide exportieren (Ctrl+E)">Export Slide</button>
            <button id="btn-export-all" class="action-btn action-btn-primary" title="Alle Slides exportieren">Export Alle</button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">

        <!-- Left: Slides Panel -->
        <aside id="slides-panel">
            <div class="panel-header">
                <h2>Slides</h2>
                <div class="panel-actions">
                    <button id="btn-slide-up" class="panel-btn" title="Slide nach oben">&uarr;</button>
                    <button id="btn-slide-down" class="panel-btn" title="Slide nach unten">&darr;</button>
                    <button id="btn-add-slide" class="panel-btn" title="Neuer Slide">+</button>
                    <button id="btn-duplicate-slide" class="panel-btn" title="Slide duplizieren">&#x2750;</button>
                    <button id="btn-delete-slide" class="panel-btn panel-btn-danger" title="Slide loeschen">&minus;</button>
                </div>
            </div>
            <div id="slide-list" class="slide-list"></div>

            <div class="panel-header">
                <h2>Ebenen</h2>
            </div>
            <div id="layer-list" class="layer-list"></div>
        </aside>

        <!-- Center: Canvas Workspace -->
        <section id="canvas-area">
            <div id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
                <div id="grid-overlay"></div>
                <div id="guides-overlay"></div>
            </div>
        </section>

        <!-- Right: Properties Panel -->
        <aside id="properties-panel">
            <div class="panel-header">
                <h2>Eigenschaften</h2>
            </div>
            <div class="panel-body">

                <!-- Background -->
                <div id="bg-properties" class="prop-section">
                    <h3 class="prop-title">Hintergrund</h3>
                    <div class="prop-row">
                        <label>Farbe</label>
                        <div class="color-input-wrap">
                            <input type="color" id="bg-color" value="#ffffff">
                            <input type="text" id="bg-color-hex" class="hex-input" value="#ffffff" maxlength="7">
                        </div>
                    </div>
                    <div class="prop-row">
                        <label>Hintergrundbild</label>
                        <div class="bg-image-controls">
                            <button id="btn-bg-image" class="small-btn">Bild waehlen</button>
                            <button id="btn-bg-image-remove" class="small-btn small-btn-danger" style="display:none">Entfernen</button>
                        </div>
                        <input type="file" id="bg-image-upload" accept="image/*" hidden>
                    </div>
                    <div class="prop-row">
                        <div class="palette-header">
                            <label>Schnellfarben</label>
                            <button id="btn-palette-edit" class="palette-edit-btn" title="Bearbeiten">&#9998;</button>
                        </div>
                        <div class="color-palette" id="bg-palette"></div>
                        <div id="palette-edit-controls" style="display:none;">
                            <div class="palette-add-row">
                                <input type="color" id="palette-new-color" value="#6c63ff">
                                <button id="btn-palette-add" class="small-btn" style="flex:1;">+ Farbe</button>
                                <button id="btn-palette-reset" class="small-btn" title="Zuruecksetzen">&#x21BA;</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Guides -->
                <div id="guides-properties" class="prop-section">
                    <h3 class="prop-title">Hilfslinien</h3>
                    <div class="prop-row">
                        <label>Hilfslinien anzeigen</label>
                        <label class="switch">
                            <input type="checkbox" id="guides-show" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="prop-row">
                        <div class="guides-add-row">
                            <button id="btn-guide-h" class="small-btn">+ Horizontal</button>
                            <button id="btn-guide-v" class="small-btn">+ Vertikal</button>
                        </div>
                    </div>
                    <div id="guides-list" class="guides-list"></div>
                </div>

                <!-- Grid -->
                <div id="grid-properties" class="prop-section">
                    <h3 class="prop-title">Raster</h3>
                    <div class="prop-row">
                        <label>Rastergroesse</label>
                        <input type="number" id="grid-size" value="10" min="1" max="200" class="num-input">
                    </div>
                    <div class="prop-row">
                        <label>Raster anzeigen</label>
                        <label class="switch">
                            <input type="checkbox" id="grid-show">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="prop-row">
                        <label>Am Raster einrasten</label>
                        <label class="switch">
                            <input type="checkbox" id="grid-snap">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Object Properties (shown when object selected) -->
                <div id="object-properties" class="prop-section" style="display:none;">
                    <h3 class="prop-title">Objekt</h3>

                    <div class="prop-row">
                        <label>Fuellfarbe</label>
                        <div class="color-input-wrap">
                            <input type="color" id="obj-fill" value="#000000">
                            <input type="text" id="obj-fill-hex" class="hex-input" value="#000000" maxlength="7">
                        </div>
                    </div>

                    <div class="prop-row">
                        <label>Deckkraft</label>
                        <div class="range-wrap">
                            <input type="range" id="obj-opacity" min="0" max="1" step="0.05" value="1">
                            <span id="obj-opacity-val" class="range-val">100%</span>
                        </div>
                    </div>

                    <!-- Text properties -->
                    <div id="text-properties" style="display:none;">
                        <div class="prop-row">
                            <label>Schriftart</label>
                            <select id="text-font" class="full-width">
                                <optgroup label="Sans Serif">
                                    <option value="Inter">Inter</option>
                                    <option value="Roboto">Roboto</option>
                                    <option value="Open Sans">Open Sans</option>
                                    <option value="Lato">Lato</option>
                                    <option value="Montserrat">Montserrat</option>
                                    <option value="Poppins">Poppins</option>
                                    <option value="Raleway">Raleway</option>
                                    <option value="Nunito">Nunito</option>
                                    <option value="Ubuntu">Ubuntu</option>
                                    <option value="Work Sans">Work Sans</option>
                                    <option value="Source Sans 3">Source Sans 3</option>
                                    <option value="Oswald">Oswald</option>
                                    <option value="Bebas Neue">Bebas Neue</option>
                                    <option value="Fira Sans">Fira Sans</option>
                                    <option value="PT Sans">PT Sans</option>
                                    <option value="Rubik">Rubik</option>
                                    <option value="DM Sans">DM Sans</option>
                                    <option value="Mulish">Mulish</option>
                                    <option value="Quicksand">Quicksand</option>
                                    <option value="Barlow">Barlow</option>
                                    <option value="Manrope">Manrope</option>
                                    <option value="Figtree">Figtree</option>
                                    <option value="Karla">Karla</option>
                                    <option value="Josefin Sans">Josefin Sans</option>
                                    <option value="Archivo">Archivo</option>
                                </optgroup>
                                <optgroup label="Serif">
                                    <option value="Playfair Display">Playfair Display</option>
                                    <option value="Merriweather">Merriweather</option>
                                    <option value="PT Serif">PT Serif</option>
                                    <option value="Lora">Lora</option>
                                    <option value="Libre Baskerville">Libre Baskerville</option>
                                    <option value="Crimson Text">Crimson Text</option>
                                    <option value="EB Garamond">EB Garamond</option>
                                    <option value="Cormorant Garamond">Cormorant Garamond</option>
                                    <option value="Bitter">Bitter</option>
                                    <option value="Source Serif 4">Source Serif 4</option>
                                    <option value="Spectral">Spectral</option>
                                </optgroup>
                                <optgroup label="Display">
                                    <option value="Abril Fatface">Abril Fatface</option>
                                    <option value="Anton">Anton</option>
                                    <option value="Righteous">Righteous</option>
                                    <option value="Bungee">Bungee</option>
                                    <option value="Fjalla One">Fjalla One</option>
                                    <option value="Archivo Black">Archivo Black</option>
                                    <option value="Alfa Slab One">Alfa Slab One</option>
                                    <option value="Lobster">Lobster</option>
                                    <option value="Pacifico">Pacifico</option>
                                    <option value="Russo One">Russo One</option>
                                    <option value="Staatliches">Staatliches</option>
                                    <option value="Monoton">Monoton</option>
                                </optgroup>
                                <optgroup label="Handschrift">
                                    <option value="Dancing Script">Dancing Script</option>
                                    <option value="Caveat">Caveat</option>
                                    <option value="Great Vibes">Great Vibes</option>
                                    <option value="Shadows Into Light">Shadows Into Light</option>
                                    <option value="Amatic SC">Amatic SC</option>
                                    <option value="Satisfy">Satisfy</option>
                                    <option value="Sacramento">Sacramento</option>
                                    <option value="Kalam">Kalam</option>
                                    <option value="Indie Flower">Indie Flower</option>
                                    <option value="Permanent Marker">Permanent Marker</option>
                                    <option value="Parisienne">Parisienne</option>
                                </optgroup>
                                <optgroup label="Monospace">
                                    <option value="Roboto Mono">Roboto Mono</option>
                                    <option value="Source Code Pro">Source Code Pro</option>
                                    <option value="Fira Code">Fira Code</option>
                                    <option value="JetBrains Mono">JetBrains Mono</option>
                                    <option value="IBM Plex Mono">IBM Plex Mono</option>
                                    <option value="Space Mono">Space Mono</option>
                                </optgroup>
                                <optgroup label="System">
                                    <option value="Arial">Arial</option>
                                    <option value="Helvetica">Helvetica</option>
                                    <option value="Georgia">Georgia</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Courier New">Courier New</option>
                                    <option value="Verdana">Verdana</option>
                                    <option value="Impact">Impact</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="prop-row">
                            <label>Schriftgroesse</label>
                            <input type="number" id="text-size" value="40" min="8" max="500" class="num-input">
                        </div>
                        <div class="prop-row">
                            <label>Textfarbe</label>
                            <div class="color-input-wrap">
                                <input type="color" id="text-color" value="#000000">
                                <input type="text" id="text-color-hex" class="hex-input" value="#000000" maxlength="7">
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Stil</label>
                            <div class="btn-group">
                                <button id="text-bold" class="style-btn" title="Fett"><strong>B</strong></button>
                                <button id="text-italic" class="style-btn" title="Kursiv"><em>I</em></button>
                                <button id="text-underline" class="style-btn" title="Unterstrichen"><u>U</u></button>
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Ausrichtung</label>
                            <div class="btn-group">
                                <button id="text-align-left" class="style-btn" title="Linksbuendig">&#9776;</button>
                                <button id="text-align-center" class="style-btn" title="Zentriert">&#9776;</button>
                                <button id="text-align-right" class="style-btn" title="Rechtsbuendig">&#9776;</button>
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Zeilenhoehe</label>
                            <input type="number" id="text-line-height" value="1.2" min="0.5" max="5" step="0.1" class="num-input">
                        </div>
                    </div>

                    <!-- Blob properties -->
                    <div id="blob-properties" style="display:none;">
                        <div class="prop-row">
                            <label>Flaeche Breite</label>
                            <input type="number" id="blob-area-w" value="400" min="50" max="2000" class="num-input">
                        </div>
                        <div class="prop-row">
                            <label>Flaeche Hoehe</label>
                            <input type="number" id="blob-area-h" value="400" min="50" max="2000" class="num-input">
                        </div>
                        <div class="prop-row">
                            <label>Hintergrundfarbe</label>
                            <div class="color-input-wrap">
                                <input type="color" id="blob-bg-color" value="#ffffff">
                                <input type="text" id="blob-bg-color-hex" class="hex-input" value="#ffffff" maxlength="7">
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Kein Hintergrund</label>
                            <label class="switch">
                                <input type="checkbox" id="blob-bg-transparent" checked>
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                        <div class="prop-row">
                            <label>Anzahl Blobs</label>
                            <input type="number" id="blob-count" value="1" min="1" max="50" class="num-input">
                        </div>
                        <div class="prop-row">
                            <label>Rundung</label>
                            <div class="range-wrap">
                                <span class="range-label-sm">eckig</span>
                                <input type="range" id="blob-smoothness" min="0" max="1" step="0.05" value="1">
                                <span class="range-label-sm">rund</span>
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Ecken</label>
                            <div class="pos-inputs">
                                <div class="pos-field">
                                    <span>Min</span>
                                    <input type="number" id="blob-corners-min" value="6" min="3" max="20" class="num-input">
                                </div>
                                <div class="pos-field">
                                    <span>Max</span>
                                    <input type="number" id="blob-corners-max" value="10" min="3" max="20" class="num-input">
                                </div>
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Ueberlappung erlauben</label>
                            <label class="switch">
                                <input type="checkbox" id="blob-allow-overlap">
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                        <div class="prop-row">
                            <label>Groessenmodus</label>
                            <select id="blob-size-mode" class="full-width">
                                <option value="equal">Alle gleich gross</option>
                                <option value="mixed">Ein grosser + kleine</option>
                            </select>
                        </div>
                        <div class="prop-row" id="blob-large-scale-row" style="display:none;">
                            <label>Faktor grosser Blob</label>
                            <input type="number" id="blob-large-scale" value="2.5" min="1.5" max="5" step="0.5" class="num-input">
                        </div>
                        <div class="prop-row">
                            <label>Blob-Deckkraft</label>
                            <div class="range-wrap">
                                <input type="range" id="blob-opacity" min="0" max="1" step="0.05" value="1">
                                <span id="blob-opacity-val" class="range-val">100%</span>
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Blob-Farben</label>
                            <div id="blob-colors-list"></div>
                            <button id="blob-add-color" class="small-btn" style="margin-top:4px;width:100%">+ Farbe hinzufuegen</button>
                        </div>
                        <div class="prop-row">
                            <button id="blob-regenerate" class="small-btn" style="width:100%;padding:6px 10px;">Neu generieren</button>
                        </div>
                        <div class="prop-row">
                            <button id="blob-ungroup" class="small-btn" style="width:100%;padding:6px 10px;">Einzeln bearbeiten</button>
                        </div>
                    </div>

                    <!-- Shape properties -->
                    <div id="shape-properties" style="display:none;">
                        <div class="prop-row">
                            <label>Rahmenfarbe</label>
                            <div class="color-input-wrap">
                                <input type="color" id="shape-stroke" value="#000000">
                                <input type="text" id="shape-stroke-hex" class="hex-input" value="#000000" maxlength="7">
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Rahmenbreite</label>
                            <input type="number" id="shape-stroke-width" value="0" min="0" max="50" class="num-input">
                        </div>
                        <div class="prop-row" id="radius-row">
                            <label>Eckenradius</label>
                            <input type="number" id="shape-radius" value="0" min="0" max="500" class="num-input">
                        </div>
                        <div class="prop-row" id="path-edit-row" style="display:none;">
                            <button id="btn-path-edit" class="small-btn" style="width:100%;padding:6px 10px;">Ecken bearbeiten</button>
                        </div>
                    </div>

                    <!-- Position / Size -->
                    <div class="prop-row">
                        <label>Position</label>
                        <div class="pos-inputs">
                            <div class="pos-field">
                                <span>X</span>
                                <input type="number" id="obj-left" class="num-input" value="0">
                            </div>
                            <div class="pos-field">
                                <span>Y</span>
                                <input type="number" id="obj-top" class="num-input" value="0">
                            </div>
                        </div>
                    </div>
                    <div class="prop-row">
                        <label>Groesse</label>
                        <div class="pos-inputs">
                            <div class="pos-field">
                                <span>B</span>
                                <input type="number" id="obj-width" class="num-input" value="0" min="1">
                            </div>
                            <div class="pos-field">
                                <span>H</span>
                                <input type="number" id="obj-height" class="num-input" value="0" min="1">
                            </div>
                        </div>
                    </div>
                    <div class="prop-row">
                        <label>Drehung</label>
                        <div class="pos-inputs">
                            <div class="pos-field">
                                <span>&deg;</span>
                                <input type="number" id="obj-angle" class="num-input" value="0" min="0" max="360">
                            </div>
                        </div>
                    </div>

                    <div class="prop-row">
                        <label>Ausrichten (H)</label>
                        <div class="btn-group">
                            <button id="align-left"    class="style-btn" title="Links ausrichten">&larr;</button>
                            <button id="align-hcenter" class="style-btn" title="Horizontal zentrieren">&harr;</button>
                            <button id="align-right"   class="style-btn" title="Rechts ausrichten">&rarr;</button>
                        </div>
                    </div>
                    <div class="prop-row">
                        <label>Ausrichten (V)</label>
                        <div class="btn-group">
                            <button id="align-top"     class="style-btn" title="Oben ausrichten">&uarr;</button>
                            <button id="align-vcenter" class="style-btn" title="Vertikal zentrieren">&#x2195;</button>
                            <button id="align-bottom"  class="style-btn" title="Unten ausrichten">&darr;</button>
                        </div>
                    </div>
                    <div class="prop-row" id="align-hint-row">
                        <label></label>
                        <span class="align-hint" id="align-hint">An Slide ausrichten</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/canvas-manager.js"></script>
    <script src="js/path-editor.js"></script>
    <script src="js/slide-manager.js"></script>
    <script src="js/export-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
